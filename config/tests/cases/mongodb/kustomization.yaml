apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: db-system

resources: 
- ../../../default
- foo-secret.yaml
- root-secret.yaml
- user.yaml
- db.yaml

helmCharts:
- repo: https://charts.bitnami.com/bitnami
  name: mongodb
  version: 18.5.0
  releaseName: mongodb
  namespace: db-system
  valuesInline:
    image:
      repository: bitnamilegacy/mongodb
      tag: 8.0.13-debian-12-r0
    persistence:
      enabled: false
    auth:
      rootPassword: password

images:
- name: ghcr.io/doodlescheduling/db-controller
  newTag: latest
  newName: db-controller
